name: Build dev image

# Builds the connector container on every push to main and PRs.
# Pushes ghcr.io/bee-flow/connector:dev (always latest main) and
# ghcr.io/bee-flow/connector:main-<sha7> (immutable snapshot).
# Local-sandbox.sh / docs install commands can pull `:dev` directly so
# contributors don't have to wait 1-3 min on a docker build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/bee-flow/connector

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          SHA7=$(echo "${{ github.sha }}" | cut -c1-7)
          {
            echo "sha7=$SHA7"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "tags=${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}"
              echo "push=false"
            else
              echo "tags=${{ env.IMAGE }}:dev,${{ env.IMAGE }}:main-$SHA7"
              echo "push=true"
            fi
          } >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.meta.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
