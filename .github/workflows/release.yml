name: release

# Triggered by tags shaped like v0.1.0. Runs only after the connector has
# been extracted to its own public repo and the Nextcloud signing cert has
# been merged into github.com/nextcloud/app-certificate-requests.
#
# Required GitHub Actions secrets (configure on the `release` environment):
#   NC_APP_SIGNING_KEY  — RSA private key matching the merged cert
#   NCAPPSTORE_TOKEN    — apps.nextcloud.com API token (Settings → API tokens)
#   GITHUB_TOKEN        — provided automatically; used for the GHCR push and
#                         the GitHub release upload

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  APP_ID: bee_flow
  # Must match <docker-install><image> in appinfo/info.xml so AppAPI pulls
  # the same image admins see referenced in the manifest.
  IMAGE: ghcr.io/bee-flow/connector

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify info.xml version matches tag
        run: |
          xml_ver=$(grep -oPm1 '(?<=<version>)[^<]+' appinfo/info.xml)
          if [ "$xml_ver" != "${{ steps.ver.outputs.version }}" ]; then
            echo "::error::info.xml version ($xml_ver) does not match tag (${{ steps.ver.outputs.version }})"
            exit 1
          fi

      - name: Verify CHANGELOG has matching heading
        run: |
          if ! grep -qE "^## \[?${{ steps.ver.outputs.version }}\]?" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a heading for ${{ steps.ver.outputs.version }}"
            exit 1
          fi

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # amd64 covers most NC servers; arm64 covers Raspberry Pi / Apple
          # Silicon / Graviton. App Store reviewers test both — image must
          # support both or the listing review fails.
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest
          # Pin the frontend to hive `main`. Hive has its own version
          # lifecycle (1.x in agent-hub/package.json) decoupled from this
          # connector's v0.1.x tags; trying to share tag strings caused
          # hive release-workflow failures (`Tag X does not match
          # package.json version Y`). For App Store audits the connector
          # image is still reproducible because Docker buildx records the
          # resolved hive commit SHA in the SBOM step below.
          build-args: |
            HIVE_REF=main
          # Reproducible builds matter for App Store audits.
          provenance: true
          sbom: true

      - name: Build app tarball
        run: |
          mkdir -p dist staging/${{ env.APP_ID }}
          cp -r appinfo img CHANGELOG.md README.md LICENSE staging/${{ env.APP_ID }}/
          tar -czf dist/${{ env.APP_ID }}.tar.gz -C staging ${{ env.APP_ID }}

      - name: Sign tarball
        env:
          SIGNING_KEY: ${{ secrets.NC_APP_SIGNING_KEY }}
        run: |
          keyfile=$(mktemp)
          # The secret is stored as PEM; mktemp+chmod prevents it leaking via
          # /proc/<pid>/environ during the openssl call.
          printf '%s' "$SIGNING_KEY" > "$keyfile"
          chmod 600 "$keyfile"
          openssl dgst -sha512 -sign "$keyfile" dist/${{ env.APP_ID }}.tar.gz \
            | openssl base64 -A > dist/${{ env.APP_ID }}.tar.gz.sig
          shred -u "$keyfile"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # Force published (not draft) and explicit name so the v0.1.11
          # incident — where the release sat as Draft titled "v0.1.10" and
          # the download URLs 404'd publicly — can't repeat.
          draft: false
          name: ${{ github.ref_name }}
          files: |
            dist/${{ env.APP_ID }}.tar.gz
            dist/${{ env.APP_ID }}.tar.gz.sig

      - name: Register release on apps.nextcloud.com
        env:
          NCAPPSTORE_TOKEN: ${{ secrets.NCAPPSTORE_TOKEN }}
          # First production release should set this secret to '0'. While
          # iterating on the listing, leave it '1' to publish to the nightly
          # channel where only admins who explicitly opt in see it.
          NIGHTLY: ${{ vars.NCAPPSTORE_NIGHTLY || '1' }}
        run: |
          download_url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.APP_ID }}.tar.gz"
          # `openssl base64 -A` already emits a single line and bash's $(…)
          # strips trailing newlines, but tr -d is belt-and-suspenders against
          # any future change to the signing step that could re-introduce
          # whitespace and trip a strict server-side parser.
          signature=$(tr -d '[:space:]' < "dist/${{ env.APP_ID }}.tar.gz.sig")
          nightly_val=$([ "$NIGHTLY" = "1" ] && echo true || echo false)
          payload=$(jq -nc \
            --arg url "$download_url" \
            --arg sig "$signature" \
            --argjson nightly "$nightly_val" \
            '{download:$url, signature:$sig, nightly:$nightly}')

          # Probe a known-stable endpoint to distinguish a site-wide outage
          # from an auth/payload error. /api/v1/categories.json is unauthenticated
          # and changes independently of the apps backend, so it stays 200 even
          # when /api/v1/apps/<id> endpoints are 5xx.
          probe=$(curl -sS -o /dev/null -w '%{http_code}' https://apps.nextcloud.com/api/v1/categories.json || echo "000")
          if ! [[ "$probe" =~ ^2 ]]; then
            echo "::warning::apps.nextcloud.com is unhealthy (categories probe → $probe)."
            echo "::warning::Skipping release registration; the GHCR image and GitHub Release are unaffected."
            echo "::warning::Re-run this job (Actions → run → Re-run failed jobs) once apps.nextcloud.com recovers."
            exit 0
          fi

          # apps.nextcloud.com occasionally returns 5xx for individual release
          # submissions even when the wider API is healthy. Retry on 5xx with
          # linear backoff. 409 means a release with this version was already
          # registered server-side — treat as success so re-running the same
          # tag is idempotent.
          attempts=5
          for i in $(seq 1 "$attempts"); do
            http=$(curl -sS -o /tmp/ncresp.txt -w '%{http_code}' \
              -X POST https://apps.nextcloud.com/api/v1/apps/releases \
              -H "Authorization: Token $NCAPPSTORE_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$payload")
            case "$http" in
              2??)
                echo "✓ registered ($http)"
                exit 0 ;;
              409)
                echo "⚠ already registered (409) — accepting as success"
                exit 0 ;;
              5??)
                echo "apps.nextcloud.com $http on attempt $i/$attempts — retrying"
                echo "--- response body ---"
                cat /tmp/ncresp.txt
                echo "--- end response ---"
                sleep $((i * 30)) ;;
              *)
                echo "::error::apps.nextcloud.com returned $http (not retryable)"
                cat /tmp/ncresp.txt
                exit 1 ;;
            esac
          done
          echo "::error::apps.nextcloud.com still 5xx after $attempts attempts"
          cat /tmp/ncresp.txt
          exit 1
